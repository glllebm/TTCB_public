  <!-- ============ MAIN CONTENT ============ -->
  <div class="profile-content">

    <!-- Name row -->
    <div class="name-row">
      <a class="back-btn" href="TTCB_Rating.html">
        <img src="icons/back.svg" width="20" height="20" alt="Back" style="width:16px;height:16px">
      </a>
      <div class="name-row-inner">
        <div class="player-name-big" id="pName"><span class="skeleton" style="display:inline-block;width:200px;height:26px;border-radius:6px;vertical-align:middle"></span></div>
        <div class="player-id"><span>id </span><span id="pId"><span class="skeleton" style="display:inline-block;width:60px;height:14px;border-radius:4px;vertical-align:middle"></span></span></div>
      </div>
    </div>

    <!-- Card 1: Rating + Rank -->
    <div class="profile-card">
      <div class="stat-group">
        <div class="stat-block">
          <span class="label">Rating</span>
          <div class="stat-pill">
            <span class="val" id="pRating"><span class="skeleton" style="display:inline-block;width:50px;height:20px;border-radius:4px;vertical-align:middle"></span></span>
            <img src="icons/arrow-up.svg" width="15" height="15" alt="" style="width:24px;height:24px;display:none" id="pRatingArrow">
          </div>
        </div>
        <div class="stat-block">
          <span class="label">Rank</span>
          <div class="stat-pill">
            <span class="rank-val" id="pRank"><span class="skeleton" style="display:inline-block;width:30px;height:20px;border-radius:4px;vertical-align:middle"></span></span>
            <span style="display:inline-flex; align-items:center; gap:3px;">
              <img src="icons/arrow-up.svg" width="14" height="14" alt="" id="pRankArrow" style="display:none">
              <span style="font-size:15px; font-weight:500; color:#5AAD32; display:none" id="pRankChange"></span>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2: Tournaments / Matches / Win rate -->
    <div class="profile-card">
      <div class="stat-row3">
        <div class="stat-col">
          <span class="label">Tournaments</span>
          <div class="plate-full" id="pTournaments"><span class="skeleton" style="display:inline-block;width:40px;height:16px;border-radius:4px"></span></div>
        </div>
        <div class="stat-col">
          <span class="label">Matches</span>
          <div class="plate-full matches-plate">
            <span id="pMatches"><span class="skeleton" style="display:inline-block;width:30px;height:16px;border-radius:4px;vertical-align:middle"></span></span>
            <span class="wl"><span style="color:#5AAD32;" id="pWins"></span><span style="color:#999999;" id="pWLSep" style="display:none"></span><span style="color:#ED6455;" id="pLosses"></span></span>
          </div>
        </div>
        <div class="stat-col">
          <span class="label">Win rate</span>
          <div class="plate-full" id="pWinRate"><span class="skeleton" style="display:inline-block;width:60px;height:16px;border-radius:4px"></span></div>
        </div>
      </div>
    </div>

    <!-- Card 3: Age + Playing hand -->
    <div class="two-col">
      <div class="box">
        <span class="label">Age</span>
        <span class="val" id="pAge"><span class="skeleton" style="display:inline-block;width:70px;height:18px;border-radius:4px;vertical-align:middle"></span></span>
      </div>
      <div class="box">
        <span class="label">Playing hand</span>
        <span class="val" id="pHand"><span class="skeleton" style="display:inline-block;width:80px;height:18px;border-radius:4px;vertical-align:middle"></span></span>
      </div>
    </div>

    <!-- Card 4: Equipment -->
    <div class="equip-card">
      <div class="equip-item">
        <span class="label">Blade</span>
        <span class="val" id="pBlade"><span class="skeleton" style="display:inline-block;width:180px;height:18px;border-radius:4px;vertical-align:middle"></span></span>
      </div>
      <div class="equip-item">
        <span class="label">Right rubber</span>
        <span class="val" id="pRightRubber"><span class="skeleton" style="display:inline-block;width:150px;height:18px;border-radius:4px;vertical-align:middle"></span></span>
      </div>
      <div class="equip-item">
        <span class="label">Left rubber</span>
        <span class="val" id="pLeftRubber"><span class="skeleton" style="display:inline-block;width:150px;height:18px;border-radius:4px;vertical-align:middle"></span></span>
      </div>
    </div>

<script src="js/main.js"></script>
<script>
(function () {
  function showError(msg) {
    var el = document.querySelector('.profile-content');
    if (el) el.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#ED6455;font-size:16px;font-weight:500;">' + msg + '</div>';
  }

  var id = null;
  try { id = new URLSearchParams(location.search).get('id'); } catch (e) {}
  if (!id) { showError('Player not found.'); return; }

  fetch('/api/players/' + id)
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (p) {
      if (!p) throw new Error('No data');
      document.getElementById('pName').textContent = p.name;
      document.getElementById('pId').textContent = p.clubId != null ? p.clubId : p.id;
      document.getElementById('pRating').textContent = p.rating != null ? p.rating : '\u2014';
      document.getElementById('pRatingArrow').src = 'icons/' + (p.trend === 'down' ? 'arrow-down.svg' : 'arrow-up.svg');
      document.getElementById('pRatingArrow').style.display = p.rating == null ? 'none' : '';
      document.getElementById('pRank').textContent = p.rank != null ? p.rank : '\u2014';

      var rankArrow = document.getElementById('pRankArrow');
      var rankChangeEl = document.getElementById('pRankChange');
      if (p.rankChange == null || p.rankChange === 0) {
        rankArrow.style.display = 'none';
        rankChangeEl.style.display = 'none';
      } else {
        var up = p.rankChange > 0;
        rankArrow.style.display = '';
        rankChangeEl.style.display = '';
        rankArrow.src = 'icons/' + (up ? 'arrow-up.svg' : 'arrow-down.svg');
        rankChangeEl.style.color = up ? '#5AAD32' : '#ED6455';
        rankChangeEl.textContent = Math.abs(p.rankChange);
      }

      document.getElementById('pTournaments').textContent = p.tournaments || 0;
      document.getElementById('pMatches').textContent = p.matches || 0;
      document.getElementById('pWins').textContent = p.won || 0;
      document.getElementById('pWLSep').textContent = '-';
      document.getElementById('pLosses').textContent = p.lost || 0;
      document.getElementById('pWinRate').textContent = typeof p.winRate === 'number' ? p.winRate.toFixed(2) + '%' : '\u2014';
      document.getElementById('pAge').textContent = typeof p.age === 'number' ? p.age + ' years' : '\u2014';
      document.getElementById('pHand').textContent = p.hand === 'left' ? 'Left hand' : p.hand === 'right' ? 'Right hand' : '\u2014';
      document.getElementById('pBlade').textContent = p.blade || '\u2014';
      document.getElementById('pRightRubber').textContent = p.rightRubber || '\u2014';
      document.getElementById('pLeftRubber').textContent = p.leftRubber || '\u2014';
    })
    .catch(function () { showError('Could not load player data. Please try again later.'); });
})();
</script>
