<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tournaments — TTCB</title>
<link rel="icon" href="/icons/logo.svg" type="image/svg+xml">
<style>
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PT Root UI', system-ui, sans-serif; background: #F0F0F0; min-height: 100vh; color: #1A1A1A; padding: 20px 24px 32px; }

.content { max-width: 748px; margin: 48px auto 0; }
.head-row { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
.head-icon { width: 36px; height: 36px; border-radius: 13px; background: #1A1A1A; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.head-h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }

.section-label { font-size: 16px; color: #999; margin-bottom: 16px; }

/* Tournament row: 2 columns */
.trow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.tcard-main { position: relative; background: #F0F0F0; border-radius: 16px; padding: 20px; overflow: hidden; min-height: 160px; display: flex; flex-direction: column; justify-content: space-between; gap: 14px; }
.tcard-main.done { background: #1A1A1A; color: #fff; }
.tcard-side { background: #F7F7F7; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.tcard-title { font-size: 22px; font-weight: 700; }
.tcard-meta { display: flex; flex-direction: column; gap: 14px; }
.tcard-meta-row { display: flex; align-items: center; gap: 8px; font-size: 15px; }
.tcard-meta-label { color: #999; }
.tcard-meta-val { font-weight: 500; }
.tcard-btn { display: inline-flex; align-items: center; gap: 10px; background: #1A1A1A; color: #fff; border-radius: 16px; padding: 14px 20px; font-size: 16px; font-weight: 500; text-decoration: none; cursor: pointer; transition: background 0.15s ease; align-self: flex-start; }
.tcard-btn:hover { background: #292929; }
.tcard-spots { display: flex; align-items: center; gap: 8px; font-size: 15px; }
.tcard-spots-label { color: #999; }
.tcard-spots-val { font-weight: 700; font-size: 16px; }

/* Top 3 leaderboard */
.top3-row { display: flex; align-items: center; gap: 12px; }
.top3-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
.top3-rank { font-size: 15px; font-weight: 700; width: 14px; flex: 0 0 auto; }
.top3-name { font-size: 15px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.top3-rating { display: flex; align-items: center; gap: 4px; background: #fff; border-radius: 10px; padding: 6px 10px; flex: 0 0 auto; }
.top3-rating-val { font-size: 14px; font-weight: 500; color: #F74A96; }

.footer { max-width: 900px; margin: 56px auto 0; background: #fff; border-radius: 20px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
.footer-right { display: flex; align-items: center; gap: 40px; font-size: 14px; color: #666; }

.empty { padding: 48px; text-align: center; color: #999; background: #fff; border-radius: 20px; }

@media (max-width: 768px) {
  body { padding: 8px 8px 32px; }
  .content { margin-top: 24px; }
  .trow { grid-template-columns: 1fr; }
  .head-h1 { font-size: 28px; }
}
</style>
</head>
<body>
<div data-page="" data-menu="closed">
  <div id="nav-container"></div>

  <div class="content">
    <div class="head-row">
      <div class="head-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M16.8114 13.9323C17.2805 13.758 17.8155 13.5823 18.2936 13.4049C18.0988 13.7752 17.9741 14.1858 18.1013 14.528C18.7985 16.4035 19.9845 18.6704 20.0004 18.7008L17.551 19.6112C17.5434 19.5784 16.9614 17.0865 16.2643 15.2108C16.1371 14.8687 15.775 14.6389 15.3857 14.4857C15.8522 14.3108 16.3557 14.1017 16.8114 13.9323ZM12.6329 2.69258C15.6131 1.58483 19.2017 3.70181 20.1269 7.30168C21.3678 12.1302 19.2321 12.2821 16.5657 13.2732C13.8994 14.2643 12.1834 15.5439 9.96931 11.0772C8.31864 7.74715 9.65279 3.80045 12.6329 2.69258Z" fill="#fff"/><path d="M13.12 16.6257C13.0651 17.0404 13.0897 17.4686 13.3271 17.7458C14.6266 19.2631 16.5194 20.9773 16.5507 21.0056L14.5663 22.7058C14.5475 22.6771 13.1403 20.5399 11.8388 19.0202C11.6012 18.7431 11.1818 18.6527 10.7636 18.6433C11.1507 18.3114 11.5641 17.9288 11.9442 17.6032C12.3134 17.2871 12.7408 16.9486 13.12 16.6257ZM4.14444 8.49582C5.28001 7.52334 6.7877 7.17363 8.28604 7.39426C8.1706 8.76045 8.41739 10.1981 9.07315 11.5212C10.2132 13.8211 11.4114 15.0416 12.9882 15.2155C13.1758 15.2362 13.3607 15.2366 13.5429 15.2282C13.0324 15.8477 12.2746 16.3947 11.4872 17.0691C9.32681 18.9194 8.15739 20.7126 4.538 17.2849C1.83943 14.7291 1.72973 10.5641 4.14444 8.49582ZM9.26846 7.62277C10.6065 8.04783 11.8685 8.93071 12.7685 10.2351C14.0189 12.0476 14.3347 13.2312 14.1132 14.1472C12.6718 14.468 11.429 14.0216 9.96964 11.0778C9.41168 9.95223 9.19608 8.75589 9.26846 7.62277Z" fill="#fff"/></svg>
      </div>
      <h1 class="head-h1">Tournaments</h1>
    </div>

    <div id="tournaments-content">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <div class="footer">
    <img src="/icons/logo-footer.svg" width="40" height="40" alt="TTCB" style="display:block;">
    <div class="footer-right">
      <span>Table Tennis Club Beograd</span>
      <span>2026</span>
    </div>
  </div>
</div>

<script src="/nav.js"></script>
<script>
renderNav('tournaments');

const ARROW_UP = `<svg width="12" height="12" viewBox="0 0 14 12" fill="none"><path d="M3.4 0.7L0.2 6.2C0.07 6.44 0 6.71 0 6.99C0 7.83 0.67 8.5 1.5 8.5H12.5C13.33 8.5 14 7.83 14 6.99C14 6.71 13.93 6.44 13.8 6.2L10.6 0.7C10.3 0.27 9.82 0 9.3 0H4.7C4.18 0 3.7 0.27 3.4 0.7Z" fill="#5AAD32"/></svg>`;
const ARROW_RIGHT = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 12H6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12.8589 5.3176L19.5413 12L12.8589 18.6824" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const DOT_GOLD = '#E3A93E', DOT_SILVER = '#999', DOT_BRONZE = '#F39072';

function esc(s) { return s ? String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : ''; }

async function load() {
  const [tournaments, allPlayers] = await Promise.all([
    fetch('/api/tournaments').then(r => r.json()),
    fetch('/api/players').then(r => r.json()).catch(() => [])
  ]);

  const ranked = [...allPlayers].filter(x => x.rating != null).sort((a,b) => b.rating - a.rating);
  const rankOf = {};
  ranked.forEach((p, i) => { rankOf[p.id] = i + 1; });

  const done = tournaments.filter(t => t.status === 'done').sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const container = document.getElementById('tournaments-content');
  let html = '';

  if (!done.length) {
    container.innerHTML = '<div class="empty">No completed tournaments yet.</div>';
    return;
  }

  // Completed tournaments
  html += `<div class="section-label">Completed Tournaments</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:12px;">`;

  for (const t of done) {
    // Get tournament state to find top 3
    let state = {};
    try { state = await fetch('/api/tournament-state/' + encodeURIComponent(t.id)).then(r => r.json()); } catch(e) {}

    let top3HTML = '';
    if (state && state.players && state.results) {
      // Compute standings from results
      const n = state.players.length;
      const pts = Array(n).fill(0);
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          if (i === j || !state.results[i] || !state.results[i][j]) continue;
          const [a, b] = state.results[i][j];
          if (a + b === 0) continue;
          pts[i] += a > b ? 2 : 1;
        }
      }
      const order = state.players.map((_,i)=>i).filter(i=>pts[i]>0).sort((a,b)=>pts[b]-pts[a]).slice(0,3);
      const dots = [DOT_GOLD, DOT_SILVER, DOT_BRONZE];
      order.forEach((idx, rank) => {
        const p = state.players[idx];
        const fullPlayer = allPlayers.find(x => x.id === p.fromId);
        const name = fullPlayer ? fullPlayer.name : (p.name || '—');
        const rating = fullPlayer ? (fullPlayer.rating || '—') : '—';
        top3HTML += `<div class="top3-row">
          <div class="top3-dot" style="background:${dots[rank]};"></div>
          <span class="top3-rank">${rank+1}</span>
          <span class="top3-name">${esc(name)}</span>
          <div class="top3-rating"><span class="top3-rating-val">${rating}</span>${ARROW_UP}</div>
        </div>`;
      });
    }

    html += `<div class="trow">
      <div class="tcard-main done">
        <div class="tcard-title">${esc(t.name || 'Tournament')}</div>
        <div class="tcard-meta">
          <div class="tcard-meta-row">
            <img src="/icons/calendar.svg" width="16" height="16" alt="" style="display:block;filter:invert(1);">
            <span class="tcard-meta-label" style="color:#999;">Date</span>
            <span class="tcard-meta-val">${esc(t.date || '—')}</span>
          </div>
          <div class="tcard-meta-row">
            <img src="/icons/players.svg" width="16" height="16" alt="" style="display:block;filter:invert(1);">
            <span class="tcard-meta-label" style="color:#999;">Players</span>
            <span class="tcard-meta-val">${t.players || 0}</span>
          </div>
        </div>
      </div>
      <div class="tcard-side" style="display:flex;flex-direction:column;gap:12px;justify-content:center;">
        ${top3HTML || '<div style="color:#999;font-size:14px;">No results</div>'}
      </div>
    </div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

load().catch(e => {
  document.getElementById('tournaments-content').innerHTML = '<div class="empty">Failed to load tournaments.</div>';
});
</script>
</body>
</html>
