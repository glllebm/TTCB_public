<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Player — TTCB</title>
<link rel="icon" href="/icons/logo.svg" type="image/svg+xml">
<style>
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'PT Root UI'; src: url('/fonts/pt-root-ui_bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PT Root UI', system-ui, sans-serif; background: #F0F0F0; min-height: 100vh; color: #1A1A1A; padding: 20px 24px 32px; }

.content { max-width: 700px; margin: 48px auto 0; }
.name-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; position: relative; }
.back-btn { width: 44px; height: 44px; border-radius: 50%; background: #ebebeb; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; transition: background 0.15s ease; flex: 0 0 auto; position: absolute; left: -60px; }
.back-btn:hover { background: #e0e0e0; }
.player-avatar { width: 48px; height: 48px; border-radius: 16px; background: #1A1A1A; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.player-name { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; }
.player-id { font-size: 16px; color: #999; white-space: nowrap; margin-left: 8px; }

.card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 12px; }
.card-row { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-block { display: flex; flex-direction: column; gap: 12px; }
.stat-label { font-size: 14px; color: #999; }
.stat-plate { background: #F5F5F5; border-radius: 12px; padding: 12px 18px; display: inline-flex; align-items: center; gap: 10px; min-width: 120px; }
.stat-plate .val { font-size: 20px; font-weight: 500; }
.stat-plate .val.pink { color: #F74A96; }
.stat-plate .val.bold { font-weight: 700; color: #1A1A1A; }
.rank-change { display: inline-flex; align-items: center; gap: 3px; font-size: 15px; font-weight: 500; }
.rank-change.up { color: #5AAD32; }
.rank-change.down { color: #ED6455; }
.wl { display: inline-flex; gap: 2px; align-items: center; font-size: 12px; font-weight: 500; }
.wl .w { color: #5AAD32; }
.wl .s { color: #999; }
.wl .l { color: #ED6455; }
.stat-plate-full { background: #F5F5F5; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; font-size: 16px; font-weight: 500; width: 100%; }
.c2-row { display: flex; gap: 12px; width: 100%; }
.c2-block { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
.c2-label { font-size: 12px; color: #999; }

.half-cards { display: flex; gap: 8px; margin-bottom: 12px; }
.half-card { flex: 1 1 160px; background: #fff; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.half-label { font-size: 12px; color: #999; }
.half-val { font-size: 18px; font-weight: 500; }

.eq-card { background: #fff; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.eq-item { display: flex; flex-direction: column; gap: 6px; }
.eq-label { font-size: 12px; color: #999; }
.eq-val { font-size: 18px; font-weight: 500; }
.eq-val.empty { color: #ccc; }

.footer { max-width: 900px; margin: 56px auto 0; background: #fff; border-radius: 20px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
.footer-right { display: flex; align-items: center; gap: 40px; font-size: 14px; color: #666; }

@media (max-width: 768px) {
  body { padding: 8px 8px 32px; }
  .content { margin-top: 24px; }
  .back-btn { position: static; margin-bottom: 0; }
  .name-row { flex-wrap: wrap; }
  .player-name { font-size: 22px; }
}
</style>
</head>
<body>
<div data-page="" data-menu="closed">
  <div id="nav-container"></div>

  <div class="content" id="content">
    <div style="padding:48px;text-align:center;color:#999;">Loading...</div>
  </div>

  <div class="footer">
    <img src="/icons/logo-footer.svg" width="40" height="40" alt="TTCB" style="display:block;">
    <div class="footer-right">
      <span>Table Tennis Club Beograd</span>
      <span>2026</span>
    </div>
  </div>
</div>

<script src="/nav.js"></script>
<script>
renderNav('rating');

const ARROW_UP = `<svg width="14" height="14" viewBox="0 0 14 12" fill="none"><path d="M3.4 0.7L0.2 6.2C0.07 6.44 0 6.71 0 6.99C0 7.83 0.67 8.5 1.5 8.5H12.5C13.33 8.5 14 7.83 14 6.99C14 6.71 13.93 6.44 13.8 6.2L10.6 0.7C10.3 0.27 9.82 0 9.3 0H4.7C4.18 0 3.7 0.27 3.4 0.7Z" fill="#5AAD32"/></svg>`;
const ARROW_DOWN = `<svg width="14" height="14" viewBox="0 0 14 12" fill="none"><path d="M3.4 7.8L0.2 2.3C0.07 2.06 0 1.79 0 1.51C0 0.67 0.67 0 1.5 0H12.5C13.33 0 14 0.67 14 1.51C14 1.79 13.93 2.06 13.8 2.3L10.6 7.8C10.3 8.23 9.82 8.5 9.3 8.5H4.7C4.18 8.5 3.7 8.23 3.4 7.8Z" fill="#ED6455"/></svg>`;

function esc(s) { return s ? String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : ''; }

function ageFromBirth(birth) {
  const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec((birth||'').trim());
  if (!m) return null;
  const [,d,mo,y] = m.map(Number);
  const now = new Date();
  let age = now.getFullYear() - y;
  if ((now.getMonth()+1) < mo || ((now.getMonth()+1) === mo && now.getDate() < d)) age--;
  return age >= 0 && age < 130 ? age : null;
}

function winRate(p) {
  const total = (p.won||0) + (p.lost||0);
  if (!total) return '—';
  return ((p.won||0)/total*100).toFixed(2) + '%';
}

async function loadPlayer() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { renderError('Player not found'); return; }

  const [p, all] = await Promise.all([
    fetch('/api/players/' + encodeURIComponent(id)).then(r => r.ok ? r.json() : null),
    fetch('/api/players').then(r => r.json()).catch(() => [])
  ]);

  if (!p) { renderError('Player not found'); return; }

  document.title = (p.name || 'Player') + ' — TTCB';

  const ranked = [...all].filter(x => x.rating != null).sort((a,b) => b.rating - a.rating);
  const rank = ranked.findIndex(x => x.id === p.id) + 1 || null;
  const age = ageFromBirth(p.birth);
  const wr = winRate(p);
  const trendUp = p.trend === 'up';
  const trendDown = p.trend === 'down';
  const matches = (p.won||0) + (p.lost||0);

  const html = `
    <div class="name-row">
      <a class="back-btn" href="/">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#1A1A1A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <div class="player-avatar">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="#fff"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span class="player-name">${esc(p.name||'—')}</span>
        <span class="player-id">id ${p.clubId||'—'}</span>
      </div>
    </div>

    <!-- Card 1: Rating + Rank -->
    <div class="card">
      <div class="card-row">
        <div class="stat-block">
          <div class="stat-label">Rating</div>
          <div class="stat-plate">
            <span class="val pink">${p.rating ?? '—'}</span>
            ${p.rating != null ? (trendUp ? ARROW_UP : trendDown ? ARROW_DOWN : '') : ''}
          </div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Rank</div>
          <div class="stat-plate">
            <span class="val bold">${rank || '—'}</span>
            ${rank && trendUp ? `<span class="rank-change up">${ARROW_UP}&nbsp;2</span>` : rank && trendDown ? `<span class="rank-change down">${ARROW_DOWN}&nbsp;2</span>` : ''}
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2: Tournaments / Matches / Win rate -->
    <div class="card">
      <div class="c2-row">
        <div class="c2-block">
          <div class="c2-label">Tournaments</div>
          <div class="stat-plate-full">${p.tournaments||0}</div>
        </div>
        <div class="c2-block">
          <div class="c2-label">Matches</div>
          <div class="stat-plate-full" style="gap:8px;">
            <span>${matches}</span>
            <span class="wl"><span class="w">${p.won||0}</span><span class="s">-</span><span class="l">${p.lost||0}</span></span>
          </div>
        </div>
        <div class="c2-block">
          <div class="c2-label">Win rate</div>
          <div class="stat-plate-full">${wr}</div>
        </div>
      </div>
    </div>

    <!-- Card 3: Age + Hand -->
    <div class="half-cards">
      <div class="half-card">
        <div class="half-label">Age</div>
        <div class="half-val">${age != null ? age + ' years' : '—'}</div>
      </div>
      <div class="half-card">
        <div class="half-label">Playing hand</div>
        <div class="half-val">${p.hand === 'left' ? 'Left hand' : p.hand === 'right' ? 'Right hand' : '—'}</div>
      </div>
    </div>

    <!-- Card 4: Equipment -->
    <div class="eq-card">
      <div class="eq-item">
        <div class="eq-label">Blade</div>
        <div class="eq-val ${!p.blade ? 'empty' : ''}">${esc(p.blade) || '—'}</div>
      </div>
      <div class="eq-item">
        <div class="eq-label">Right rubber</div>
        <div class="eq-val ${!p.forehand ? 'empty' : ''}">${esc(p.forehand) || '—'}</div>
      </div>
      <div class="eq-item">
        <div class="eq-label">Left rubber</div>
        <div class="eq-val ${!p.backhand ? 'empty' : ''}">${esc(p.backhand) || '—'}</div>
      </div>
    </div>`;

  document.getElementById('content').innerHTML = html;
}

function renderError(msg) {
  document.getElementById('content').innerHTML = `<div style="padding:48px;text-align:center;color:#999;">${msg}</div>`;
}

loadPlayer().catch(() => renderError('Failed to load player'));
</script>
</body>
</html>
